name: Daily Coordi Scraper

on:
  schedule:
    - cron: '0 6,18 * * *' # 매일 한국시간 오전/오후 3시 (UTC 18:00)
  workflow_dispatch: # 필요시 수동 실행 가능

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run scraper
        env:
          COORDI_SUPABASE_URL: ${{ secrets.COORDI_SUPABASE_URL }}
          COORDI_SUPABASE_ANON_KEY: ${{ secrets.COORDI_SUPABASE_ANON_KEY }}
        run: python fetch_coordi.py
